<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Zyqorath</title>
    <script src="https://cdn.jsdelivr.net/npm/marked/marked.min.js"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600&display=swap');

        body { 
            font-family: 'Inter', -apple-system, BlinkMacSystemFont, sans-serif; 
            background-color: #131314; /* Gemini Dark Background */
            color: #e3e3e3; 
            margin: 0; 
            display: flex; 
            flex-direction: column; 
            align-items: center;
            height: 100vh;
            box-sizing: border-box;
            overflow: hidden;
        }

        /* Top Header */
        .header {
            width: 100%;
            padding: 16px 24px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            box-sizing: border-box;
            background: #131314;
            z-index: 10;
        }
        .logo {
            font-size: 1.4rem;
            font-weight: 600;
            background: linear-gradient(74deg, #4285f4 0, #9b72cb 9%, #d96570 20%, #d96570 24%, #9b72cb 35%, #4285f4 44%, #9b72cb 50%, #d96570 56%, #d96570 75%, #9b72cb 85%, #4285f4 100%);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            letter-spacing: -0.5px;
        }

        /* Main Chat Area */
        .chat-container { 
            width: 100%; 
            max-width: 800px; 
            flex: 1;
            overflow-y: auto;
            padding: 20px 20px 140px 20px; /* Extra padding at bottom for input bar */
            box-sizing: border-box;
            scroll-behavior: smooth;
        }

        /* Scrollbar */
        ::-webkit-scrollbar { width: 8px; }
        ::-webkit-scrollbar-track { background: transparent; }
        ::-webkit-scrollbar-thumb { background: #444746; border-radius: 10px; }
        ::-webkit-scrollbar-thumb:hover { background: #5f6368; }

        /* Message Layout */
        .message-row { display: flex; margin-bottom: 32px; width: 100%; animation: fadeIn 0.4s ease; }
        @keyframes fadeIn { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }
        
        .user-row { justify-content: flex-end; }
        .ai-row { justify-content: flex-start; gap: 16px;}

        /* User Bubble */
        .user-msg { 
            background-color: #282a2c; /* Gemini user gray */
            color: #e3e3e3; 
            padding: 12px 20px; 
            border-radius: 24px; 
            max-width: 75%; 
            font-size: 1rem;
            line-height: 1.5;
        }

        /* AI Text (No Bubble) */
        .ai-avatar {
            width: 32px; height: 32px;
            background: linear-gradient(135deg, #4285f4, #d96570);
            border-radius: 50%;
            display: flex; justify-content: center; align-items: center;
            font-size: 14px; flex-shrink: 0;
        }
        .ai-msg { 
            background-color: transparent; 
            max-width: 85%; 
            font-size: 1rem;
            line-height: 1.7;
            color: #e3e3e3;
        }

        /* Markdown Styling */
        .ai-msg p { margin-top: 0; margin-bottom: 16px; }
        .ai-msg p:last-child { margin-bottom: 0; }
        .ai-msg h3 { margin-top: 0; font-size: 1.2rem; font-weight: 500; color: #fff;}
        .ai-msg strong { color: #fff; font-weight: 600;}
        .ai-msg pre { background-color: #1e1f20; padding: 16px; border-radius: 12px; overflow-x: auto; margin: 16px 0; border: 1px solid #333639;}
        .ai-msg code { font-family: 'Courier New', Courier, monospace; color: #a8c7fa; background-color: #1e1f20; padding: 2px 6px; border-radius: 6px; }
        .ai-msg ul { padding-left: 20px; margin-bottom: 16px;}
        
        .node-badge { font-size: 0.75rem; color: #a8c7fa; margin-bottom: 8px; font-weight: 500; text-transform: uppercase; letter-spacing: 0.5px;}

        /* Floating Input Bar */
        .input-wrapper {
            position: fixed;
            bottom: 0;
            width: 100%;
            max-width: 800px;
            padding: 24px 20px;
            box-sizing: border-box;
            background: linear-gradient(180deg, rgba(19,19,20,0) 0%, rgba(19,19,20,0.9) 30%, rgba(19,19,20,1) 100%);
        }
        
        .input-box {
            display: flex;
            background-color: #1e1f20;
            border-radius: 32px;
            padding: 6px 6px 6px 20px;
            align-items: center;
            border: 1px solid #333639;
            transition: 0.2s;
        }
        .input-box:focus-within { background-color: #282a2c; border-color: #444746; }

        input[type="text"] { 
            flex: 1; 
            padding: 12px 0; 
            border: none; 
            background: transparent; 
            color: #e3e3e3; 
            outline: none; 
            font-size: 1rem; 
            font-family: inherit;
        }
        input[type="text"]::placeholder { color: #8e918f; }

        .send-btn { 
            width: 40px; height: 40px; 
            border: none; 
            border-radius: 50%; 
            background-color: transparent; 
            color: #a8c7fa; 
            cursor: pointer; 
            display: flex; justify-content: center; align-items: center;
            transition: 0.2s; 
        }
        .send-btn:hover { background-color: #333639; }
        .send-btn svg { width: 20px; height: 20px; fill: currentColor; }

        /* Typing Dots */
        .typing { display: flex; gap: 4px; padding: 8px 0; align-items: center; height: 16px;}
        .typing span { width: 6px; height: 6px; background-color: #a8c7fa; border-radius: 50%; animation: bounce 1.4s infinite ease-in-out both; }
        .typing span:nth-child(1) { animation-delay: -0.32s; }
        .typing span:nth-child(2) { animation-delay: -0.16s; }
        @keyframes bounce { 0%, 80%, 100% { transform: scale(0); } 40% { transform: scale(1); } }
    </style>
</head>
<body>

    <div class="header">
        <div class="logo">Zyqorath</div>
    </div>

    <div class="chat-container" id="chat-box">
        <div class="message-row ai-row">
            <div class="ai-avatar">✨</div>
            <div class="ai-msg">
                <div class="node-badge">System Ready</div>
                <p>Hello! I am Zyqorath. What are we working on today?</p>
            </div>
        </div>
    </div>
    
    <div class="input-wrapper">
        <div class="input-box">
            <input type="text" id="user-input" placeholder="Enter a prompt here" onkeypress="handleEnter(event)" autocomplete="off">
            <button class="send-btn" onclick="sendMessage()">
                <svg viewBox="0 0 24 24"><path d="M2.01 21L23 12 2.01 3 2 10l15 2-15 2z"></path></svg>
            </button>
        </div>
    </div>

    <script>
        // ⚠️ PASTE YOUR RENDER URL ON THE LINE BELOW (Keep the /ask)
        const BACKEND_URL = "https://mindmesh-ai.onrender.com/ask"; 

        async function sendMessage() {
            const inputField = document.getElementById("user-input");
            const chatBox = document.getElementById("chat-box");
            const message = inputField.value.trim();

            if (!message) return;

            // Add User Message
            chatBox.innerHTML += `
                <div class="message-row user-row">
                    <div class="user-msg">${message}</div>
                </div>`;
            inputField.value = "";
            window.scrollTo(0, document.body.scrollHeight);
            chatBox.scrollTop = chatBox.scrollHeight;

            const thinkingId = "thinking-" + Date.now();
            
            // Add AI Thinking Animation
            chatBox.innerHTML += `
                <div class="message-row ai-row" id="row-${thinkingId}">
                    <div class="ai-avatar">✨</div>
                    <div class="ai-msg" id="${thinkingId}">
                        <div class="typing"><span></span><span></span><span></span></div>
                    </div>
                </div>`;
            chatBox.scrollTop = chatBox.scrollHeight;

            try {
                const response = await fetch(BACKEND_URL, {
                    method: "POST",
                    headers: { "Content-Type": "application/json" },
                    body: JSON.stringify({ 
                        question: message,
                        is_complex: message.length > 100 
                    })
                });
                
                const data = await response.json();
                const formattedAnswer = marked.parse(data.answer);
                
                document.getElementById(thinkingId).innerHTML = `
                    <div class="node-badge">${data.node}</div>
                    ${formattedAnswer}
                `;
            } catch (error) {
                document.getElementById(thinkingId).innerHTML = `
                    <div class="node-badge" style="color:#d96570;">⚠️ Connection Error</div>
                    <p>Unable to reach the Zyqorath servers. Please ensure the backend is running.</p>
                `;
            }
            chatBox.scrollTop = chatBox.scrollHeight;
        }

        function handleEnter(event) {
            if (event.key === 'Enter') sendMessage();
        }
    </script>
</body>
</html>
